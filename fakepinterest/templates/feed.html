{% extends "base.html" %}

{% block body %}
    {% include "navbar.html" %}

    <h1>Feed principal</h1>

    <div class="feed-container">
        {% for foto in fotos %}
        <a href="{{ url_for('perfil', id_usuario=foto.id_usuario) }}">
            <img src="{{ url_for('static', filename='fotos_posts/{}'.format(foto.imagem)) }}"
                 alt="Post de {{ foto.id_usuario }}">
        </a>
        {% endfor %}
    </div>
{% endblock %}
